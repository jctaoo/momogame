<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>纸牌接龙 - Klondike Solitaire</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <!-- 开始界面：Logo 沿用游戏名称，菜单文案单独使用可维护的中文 HTML 文本。 -->
  <section id="start-screen" class="start-screen" aria-label="开始菜单">
    <div class="start-screen__shade"></div>
    <div class="start-screen__content">
      <div class="start-screen__logo" aria-label="纸牌接龙">
        <span class="start-screen__logo-icon" aria-hidden="true">🃏</span>
        <span>纸牌接龙</span>
      </div>
      <p class="start-screen__tagline">放松一下，来一局吧</p>
      <nav class="start-screen__menu" aria-label="主菜单">
        <button class="start-menu-button start-menu-button--primary" id="menu-start" type="button">开始游戏</button>
        <button class="start-menu-button" id="menu-continue" type="button">继续游戏</button>
        <button class="start-menu-button" id="menu-settings" type="button" aria-expanded="false">游戏设置</button>
      </nav>
      <div class="start-settings" id="start-settings" hidden>
        <label for="menu-difficulty-trigger">难度</label>
        <div class="comic-select" id="menu-difficulty">
          <button class="comic-select__trigger" id="menu-difficulty-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
            <span>普通</span><i aria-hidden="true"></i>
          </button>
          <div class="comic-select__options" id="menu-difficulty-options" role="listbox" hidden>
            <button type="button" role="option" data-value="easy" aria-selected="false">简单</button>
            <button type="button" role="option" data-value="normal" aria-selected="true">普通</button>
            <button type="button" role="option" data-value="hard" aria-selected="false">困难</button>
          </div>
        </div>
        <button id="menu-sound" type="button">音效：开</button>
      </div>
    </div>
    <p class="start-screen__hint">点击“开始游戏”进入牌局</p>
  </section>

  <div id="app">
    <!-- 顶栏：统计与操作 -->
    <div id="toolbar">
      <div class="title">🃏 纸牌接龙</div>
      <div class="stats">
        <div class="stat">
          <span class="lbl">步数</span>
          <span class="val" id="s-moves">0</span>
        </div>
        <div class="stat">
          <span class="lbl">分数</span>
          <span class="val" id="s-score">0</span>
        </div>
        <div class="stat">
          <span class="lbl">时间</span>
          <span class="val" id="s-time">00:00</span>
        </div>
        <div id="diff-wrap">
          <span class="diff-label">难度</span>
          <select id="diff-select">
            <option value="easy">简单</option>
            <option value="normal" selected>普通</option>
            <option value="hard">困难</option>
          </select>
        </div>
        <div class="stat">
          <span class="lbl">重发</span>
          <span class="val" id="s-redeal">∞</span>
        </div>
        <button class="btn" id="btn-undo">↩ 撤销</button>
        <button class="btn" id="btn-hint" style="background:linear-gradient(135deg,#0277bd,#01579b)">💡 提示</button>
        <button class="btn" id="btn-sound" aria-pressed="true">🔊 音效</button>
        <button class="btn" id="btn-home" style="background:linear-gradient(135deg,#6d4c41,#4e342e)">⌂ 主页</button>
        <button class="btn" id="btn-new">🔄 新局</button>
      </div>
    </div>

    <!-- 棋盘 -->
    <div id="board">
      <!-- 上排：牌库、废牌、基础区 -->
      <div id="top-row">
        <div class="pile-col" id="stock-pile">
          <div class="slot"></div>
        </div>
        <div class="pile-col" id="waste-pile">
          <div class="slot"></div>
        </div>
        <div class="top-spacer"></div>
        <div class="pile-col fnd-col" data-fi="0">
          <div class="slot"><div class="suit-watermark">♠</div></div>
        </div>
        <div class="pile-col fnd-col" data-fi="1">
          <div class="slot"><div class="suit-watermark">♥</div></div>
        </div>
        <div class="pile-col fnd-col" data-fi="2">
          <div class="slot"><div class="suit-watermark">♦</div></div>
        </div>
        <div class="pile-col fnd-col" data-fi="3">
          <div class="slot"><div class="suit-watermark">♣</div></div>
        </div>
      </div>

      <!-- 下排：七列桌面 -->
      <div id="tableau-row">
        <div class="pile-col tab-col" data-ti="0"><div class="slot"></div></div>
        <div class="pile-col tab-col" data-ti="1"><div class="slot"></div></div>
        <div class="pile-col tab-col" data-ti="2"><div class="slot"></div></div>
        <div class="pile-col tab-col" data-ti="3"><div class="slot"></div></div>
        <div class="pile-col tab-col" data-ti="4"><div class="slot"></div></div>
        <div class="pile-col tab-col" data-ti="5"><div class="slot"></div></div>
        <div class="pile-col tab-col" data-ti="6"><div class="slot"></div></div>
      </div>
    </div>
  </div>

  <button id="auto-btn">✨ 自动完成</button>
  <svg id="hint-arrow" xmlns="http://www.w3.org/2000/svg"></svg>
  <canvas id="fireworks"></canvas>
  <div id="win-overlay">
    <div id="win-box">
      <h1>🎉 恭喜通关！</h1>
      <p id="win-stats"></p>
      <button class="btn" id="btn-replay">再来一局</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
